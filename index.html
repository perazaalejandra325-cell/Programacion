<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestión de Finca Ganadera</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef2f5;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
background:#1b5e20;
}

nav button{
padding:15px;
border:none;
background:none;
color:white;
cursor:pointer;
font-size:15px;
transition:.3s;
}

nav button:hover{
background:#388e3c;
}

.container{
max-width:1000px;
margin:20px auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
display:none;
}

.card.active{
display:block;
}

h2{
color:#2e7d32;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button.action{
background:#2e7d32;
color:white;
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
}

button.action:hover{
background:#1b5e20;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th{
background:#2e7d32;
color:white;
padding:10px;
}

table td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.resultado{
margin-top:20px;
padding:15px;
border-radius:8px;
font-weight:bold;
}

.verde{
background:#c8e6c9;
color:#1b5e20;
}

.amarillo{
background:#fff9c4;
color:#8d6e00;
}

.rojo{
background:#ffcdd2;
color:#b71c1c;
}

@media(max-width:700px){

table{
font-size:12px;
}

nav button{
width:100%;
}

}

</style>

</head>

<body>

<header>

Dashboard - Gestión de Finca Ganadera

</header>

<nav>

<button onclick="mostrar('carga')">Carga Animal</button>

<button onclick="mostrar('leche')">Producción Leche</button>

<button onclick="mostrar('sanitario')">Control Sanitario</button>

</nav>

<div class="container">

<!-- ======================= -->

<div id="carga" class="card active">

<h2>Calculadora de Carga Animal</h2>

<label>Hectáreas</label>

<input type="number" id="hectareas">

<label>Número de animales</label>

<input type="number" id="animales">

<button class="action" onclick="calcularCarga()">

Calcular

</button>

<div id="resultadoCarga"></div>

</div>

<!-- ======================= -->

<div id="leche" class="card">

<h2>Producción Diaria de Leche</h2>

<label>Fecha</label>

<input type="date" id="fechaLeche">

<label>Litros</label>

<input type="number" id="litros">

<button class="action" onclick="registrarLeche()">

Registrar

</button>

<div id="promedio"></div>

<table>

<thead>

<tr>

<th>Fecha</th>

<th>Litros</th>

</tr>

</thead>

<tbody id="tablaLeche">

</tbody>

</table>

</div>

<!-- ======================= -->

<div id="sanitario" class="card">

<h2>Calendario Sanitario</h2>

<label>Animal / Lote</label>

<input type="text" id="animal">

<label>Tratamiento</label>

<select id="tratamiento">

<option>Aftosa</option>

<option>Triple</option>

<option>Desparasitación</option>

</select>

<label>Fecha aplicación</label>

<input type="date" id="fechaVacuna">

<button class="action" onclick="agregarVacuna()">

Guardar

</button>

<table>

<thead>

<tr>

<th>Animal</th>

<th>Tratamiento</th>

<th>Aplicación</th>

<th>Próxima dosis</th>

<th>Estado</th>

</tr>

</thead>

<tbody id="tablaVacunas">

</tbody>

</table>

</div>

</div>

<script>

/**********************
NAVEGACIÓN
**********************/

function mostrar(id){

document.querySelectorAll(".card").forEach(c=>{

c.classList.remove("active");

});

document.getElementById(id).classList.add("active");

}

/**********************
CARGA ANIMAL
**********************/

function calcularCarga(){

let h=parseFloat(document.getElementById("hectareas").value);

let a=parseFloat(document.getElementById("animales").value);

if(!h || !a){

alert("Complete todos los campos");

return;

}

let carga=a/h;

let texto="";
let clase="";

if(carga<1){

texto="Subaprovechamiento";

clase="amarillo";

}

else if(carga<=2){

texto="Carga óptima";

clase="verde";

}

else{

texto="Riesgo de sobrepastoreo";

clase="rojo";

}

document.getElementById("resultadoCarga").innerHTML=

`<div class="resultado ${clase}">
UGG/Ha: <b>${carga.toFixed(2)}</b><br>${texto}
</div>`;

}

/**********************
LECHE
**********************/

const registros=[];

function registrarLeche(){

let fecha=document.getElementById("fechaLeche").value;

let litros=parseFloat(document.getElementById("litros").value);

if(!fecha || !litros){

alert("Complete todos los campos");

return;

}

registros.push({

fecha,

litros

});

actualizarTabla();

}

function actualizarTabla(){

let tbody=document.getElementById("tablaLeche");

tbody.innerHTML="";

let suma=0;

registros.forEach(r=>{

suma+=r.litros;

tbody.innerHTML+=`

<tr>

<td>${r.fecha}</td>

<td>${r.litros}</td>

</tr>

`;

});

let promedio=suma/registros.length;

let mensaje=`Promedio diario: <b>${promedio.toFixed(2)} litros</b>`;

let ultimo=registros[registros.length-1];

if(ultimo.litros<promedio*0.85){

mensaje+=`<br><span style="color:red">
⚠ La producción cayó más del 15%.
</span>`;

}

document.getElementById("promedio").innerHTML=mensaje;

}

/**********************
CALENDARIO SANITARIO
**********************/

const vacunas=[];

function agregarVacuna(){

let animal=document.getElementById("animal").value;

let tratamiento=document.getElementById("tratamiento").value;

let fecha=document.getElementById("fechaVacuna").value;

if(!animal || !fecha){

alert("Complete todos los campos");

return;

}

let prox = new Date(fecha + "T00:00:00");

switch(tratamiento){

case "Aftosa":

prox.setMonth(prox.getMonth()+6);

break;

case "Triple":

prox.setFullYear(prox.getFullYear()+1);

break;

case "Desparasitación":

prox.setMonth(prox.getMonth()+3);

break;

}

vacunas.push({

animal,

tratamiento,

fecha,

proxima:prox

});

mostrarVacunas();

}

function mostrarVacunas(){

let tbody=document.getElementById("tablaVacunas");

tbody.innerHTML="";

let hoy=new Date();

vacunas.forEach(v=>{

let dias=Math.ceil((v.proxima-hoy)/(1000*60*60*24));

let estado="";

let clase="";

if(dias<0){

estado="Vencido";

clase="rojo";

}

else if(dias<=15){

estado="Próximo";

clase="amarillo";

}

else{

estado="Al día";

clase="verde";

}

let fechaProximaStr = isNaN(v.proxima.getTime()) 
  ? "Fecha inválida" 
  : v.proxima.toLocaleDateString('es-ES');

tbody.innerHTML+=`

<tr>

<td>${v.animal}</td>

<td>${v.tratamiento}</td>

<td>${v.fecha}</td>

<td>${fechaProximaStr}</td>

<td class="${clase}">${estado}</td>

</tr>

`;

});

}

</script>

</body>
</html>
